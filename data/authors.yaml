# Auteurs du site Comparatif-Pro — multilingue FR/EN
# Un auteur dedie par categorie (6 auteurs B2B = 6 categories).
# L'ID (slug) est utilise dans le frontmatter des articles comme `author: thomas-durand`.
#
# Le champ `topics` sert a la selection automatique de l'auteur dans /create-article.
# Le champ `expertise` alimente le schema.org Person -> knowsAbout.

thomas-durand:
  id: thomas-durand
  name: Thomas Durand
  type: person
  avatar: /images/authors/thomas-durand.jpg
  linkedinUrl: ""
  category: logiciels-professionnels
  jobTitle:
    fr: Analyste logiciels B2B
    en: B2B software analyst
  role:
    fr: Analyste logiciels B2B
    en: B2B software analyst
  bio:
    fr: "Thomas Durand est journaliste specialise dans les logiciels professionnels depuis plus de douze ans. Ancien chef de projet en transformation numerique chez un integrateur, il a accompagne plus d'une centaine de deploiements ERP et CRM en PME et ETI avant de se consacrer au conseil editorial. Il decortique les solutions SaaS, les offres cloud et les outils de cybersecurite pour donner aux decideurs des cles de choix objectives, loin des discours marketing."
    en: "Thomas Durand is a journalist specialized in business software for over twelve years. A former digital transformation project manager at an integrator, he has supported more than a hundred ERP and CRM deployments in SMEs and mid-cap companies before dedicating himself to editorial consulting. He dissects SaaS solutions, cloud offerings and cybersecurity tools to provide decision-makers with objective selection criteria, far from marketing rhetoric."
  expertise:
    - ERP
    - CRM
    - SaaS B2B
    - Cloud computing
    - Cybersecurite
    - Dematerialisation
    - BI et reporting
  topics:
    - logiciel
    - saas
    - erp
    - crm
    - cloud
    - cybersecurite
    - informatique professionnelle
    - outil pro
    - b2b
    - transformation numerique

claire-beaumont:
  id: claire-beaumont
  name: Claire Beaumont
  type: person
  avatar: /images/authors/claire-beaumont.jpg
  linkedinUrl: ""
  category: amenagement-de-bureaux
  jobTitle:
    fr: Architecte d'interieur specialisee en espaces tertiaires
    en: Interior designer specialized in tertiary spaces
  role:
    fr: Architecte d'interieur & experte amenagement tertiaire
    en: Interior designer & tertiary workspace expert
  bio:
    fr: "Claire Beaumont est architecte d'interieur diplomee de l'Ecole Boulle et intervient depuis plus de douze ans sur l'amenagement d'espaces tertiaires. Apres avoir dirige les projets d'un cabinet parisien specialise dans le flex office, elle conseille desormais des entreprises sur l'ergonomie, l'acoustique et la modularite de leurs bureaux. Sur Comparatif-Pro, elle partage ses grilles de selection de mobilier, ses retours terrain et ses methodes pour concilier confort collaborateur et budget maitrise."
    en: "Claire Beaumont is an interior designer graduated from Ecole Boulle and has been working on tertiary space design for over twelve years. After leading projects at a Paris-based firm specialized in flex office, she now advises companies on ergonomics, acoustics and modularity of their offices. On Comparatif-Pro, she shares her furniture selection criteria, field feedback and methods to balance employee comfort with controlled budget."
  expertise:
