# Auteurs du site Comparatif-Pro — multilingue FR/EN
# Un auteur dedie par categorie (6 auteurs B2B = 6 categories).
# L'ID (slug) est utilise dans le frontmatter des articles comme `author: thomas-durand`.
#
# Le champ `topics` sert à la sélection automatique de l'auteur dans /create-article.
# Le champ `expertise` alimente le schema.org Person -> knowsAbout.

thomas-durand:
  id: thomas-durand
  name: Thomas Durand
  type: person
  avatar: /images/authors/thomas-durand.jpg
  linkedinUrl: ""
  category: logiciels-professionnels
  jobTitle:
    fr: Analyste logiciels B2B
    en: B2B software analyst
  role:
    fr: Analyste logiciels B2B
    en: B2B software analyst
  bio:
    fr: "Thomas Durand est journaliste spécialisé dans les logiciels professionnels depuis plus de douze ans. Ancien chef de projet en transformation numérique chez un intégrateur, il a accompagné plus d'une centaine de déploiements ERP et CRM en PME et ETI avant de se consacrer au conseil éditorial. Il décortique les solutions SaaS, les offres cloud et les outils de cybersécurité pour donner aux décideurs des clés de choix objectives, loin des discours marketing."
    en: "Thomas Durand is a journalist specialized in business software for over twelve years. A former digital transformation project manager at an integrator, he has supported more than a hundred ERP and CRM deployments in SMEs and mid-cap companies before dedicating himself to editorial consulting. He dissects SaaS solutions, cloud offerings and cybersecurity tools to provide decision-makers with objective selection criteria, far from marketing rhetoric."
  expertise:
    - ERP
    - CRM
    - SaaS B2B
    - Cloud computing
    - Cybersécurité
    - Dématérialisation
    - BI et reporting
  topics:
    - logiciel
    - saas
    - erp
    - crm
    - cloud
    - cybersécurité
    - informatique professionnelle
    - outil pro
    - b2b
    - transformation numérique

claire-beaumont:
  id: claire-beaumont
  name: Claire Beaumont
  type: person
  avatar: /images/authors/claire-beaumont.jpg
  linkedinUrl: ""
  category: aménagement-de-bureaux
  jobTitle:
    fr: Architecte d'intérieur spécialisée en espaces tertiaires
    en: Interior designer specialized in tertiary spaces
  role:
    fr: Architecte d'intérieur & experte aménagement tertiaire
    en: Interior designer & tertiary workspace expert
  bio:
    fr: "Claire Beaumont est architecte d'intérieur diplômée de l'École Boulle et intervient depuis plus de douze ans sur l'aménagement d'espaces tertiaires. Apres avoir dirigé les projets d'un cabinet parisien spécialisé dans le flex office, elle conseille désormais des entreprises sur l'ergonomie, l'acoustique et la modularité de leurs bureaux. Sur Comparatif-Pro, elle partage ses grilles de sélection de mobilier, ses retours terrain et ses méthodes pour concilier confort collaborateur et budget maîtrisé."
    en: "Claire Beaumont is an interior designer graduated from École Boulle and has been working on tertiary space design for over twelve years. After leading projects at a Paris-based firm specialized in flex office, she now advises companies on ergonomics, acoustics and modularity of their offices. On Comparatif-Pro, she shares her furniture selection criteria, field feedback and methods to balance employee comfort with controlled budget."
  expertise:
    - Aménagement tertiaire
    - Flex office
    - Ergonomie au poste de travail
    - Acoustique des bureaux
    - Mobilier professionnel
    - Cloisonnement et modularité
    - Éclairage tertiaire
  topics:
