julien-marchand:
  id: julien-marchand
  name: Julien Marchand
  type: person
  avatar: /images/authors/julien-marchand.jpg
  linkedinUrl: ""
  category: outillage-et-materiel
  jobTitle:
    fr: Charge de prevention & expert EPI
    en: Prevention officer & PPE expert
  role:
    fr: Expert outillage professionnel & prevention
    en: Professional tooling & prevention expert
  bio:
    fr: "Julien Marchand a debute sa carriere comme chef de chantier dans le batiment avant de se reconvertir, apres une formation IPRP, dans le conseil en prevention des risques professionnels. Depuis huit ans, il audite des chantiers, forme les equipes aux equipements de protection individuelle et accompagne les acheteurs dans la selection d'outillage professionnel. Sur Comparatif-Pro, il croise les exigences terrain et les normes en vigueur pour livrer des comparatifs utiles aux artisans, responsables HSE et directeurs techniques."
    en: "Julien Marchand started his career as a construction site manager before retraining, after IPRP training, into occupational risk prevention consulting. For eight years, he has been auditing construction sites, training teams on personal protective equipment and supporting buyers in selecting professional tools. On Comparatif-Pro, he combines field requirements and current standards to deliver comparisons useful to craftsmen, HSE managers and technical directors."
