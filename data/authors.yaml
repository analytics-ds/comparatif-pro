    fr: "Aurelie Vasseur est consultante independante en facility management et services aux entreprises apres un parcours de onze ans en cabinet de conseil, ou elle a pilote des missions d'externalisation pour des grands comptes industriels. Specialiste des contrats de maintenance, de la GMAO et du pilotage multi-sites, elle accompagne des directions immobilieres et des responsables de production dans leurs arbitrages entre regie interne, externalisation et solutions hybrides. Sur Comparatif-Pro, elle analyse logiciels et prestataires avec l'oeil d'une ancienne acheteuse de services."
