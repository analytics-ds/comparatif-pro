julien-marchand:
  id: julien-marchand
  name: Julien Marchand
  type: person
  avatar: /images/authors/julien-marchand.jpg
  linkedinUrl: ""
  category: outillage-et-materiel
  jobTitle:
    fr: Charge de prévention & expert EPI
    en: Prévention officer & PPE expert
  role:
    fr: Expert outillage professionnel & prévention
    en: Professional tooling & prévention expert
  bio:
    fr: "Julien Marchand a debute sa carriere comme chef de chantier dans le bâtiment avant de se reconvertir, apres une formation IPRP, dans le conseil en prévention des risques professionnels. Depuis huit ans, il audite des chantiers, formé les equipes aux équipements de protection individuelle et accompagné les acheteurs dans la sélection d'outillage professionnel. Sur Comparatif-Pro, il croise les exigences terrain et les normes en vigueur pour livrer des comparatifs utiles aux artisans, responsables HSE et directeurs techniques."
    en: "Julien Marchand started his career as a construction site manager before retraining, after IPRP training, into occupational risk prévention consulting. For eight years, he has been auditing construction sites, training teams on personal protective equipment and supporting buyers in selecting professional tools. On Comparatif-Pro, he combines field requirements and current standards to deliver comparisons useful to craftsmen, HSE managers and technical directors."
  expertise:
