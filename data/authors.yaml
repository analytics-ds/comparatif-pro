    - aménagement
    - mobilier professionnel
    - flex office
    - ergonomie
    - espace de travail
    - acoustique
    - open space
    - cloisonnement
    - coworking

marc-lefevre:
  id: marc-lefevre
  name: Marc Lefevre
  type: person
  avatar: /images/authors/marc-lefevre.jpg
  linkedinUrl: ""
  category: équipements-industriels
  jobTitle:
    fr: Ingénieur instrumentation & automatismes industriels
    en: Industrial instrumentation & automation engineer
  role:
    fr: Ingénieur instrumentation & automatismes
    en: Industrial instrumentation & automation engineer
  bio:
    fr: "Marc Lefevre est ingénieur diplômé de l'ENSIAME, spécialisé en instrumentation et automatismes industriels. Il a exercé quinze ans dans l'industrie, notamment dans l'agroalimentaire, la pharmacie et l'automobile, ou il a piloté des projets de métrologie et de contrôle qualité en ligne. Depuis 2023, il partage son expertise en redigeant des comparatifs techniques destinés aux responsables maintenance, bureaux d'études et acheteurs industriels qui cherchent à fiabiliser leurs choix d'équipements."
    en: "Marc Lefevre is an engineer graduated from ENSIAME, specialized in industrial instrumentation and automation. He has spent fifteen years in industry, notably in food processing, pharmaceuticals and automotive, where he led metrology and in-line quality control projects. Since 2023, he shares his expertise by writing technical comparisons aimed at maintenance managers, design offices and industrial buyers seeking to secure their equipment choices."
  expertise:
