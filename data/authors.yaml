sophie-bertrand:
  id: sophie-bertrand
  name: Sophie Bertrand
  type: person
  avatar: /images/authors/sophie-bertrand.jpg
  linkedinUrl: ""
  category: formations-et-certifications
  jobTitle:
    fr: Consultante en ingénierie de formation
    en: Training engineering consultant
  role:
    fr: Consultante formation & certifications professionnelles
    en: Training & professional certification consultant
  bio:
    fr: "Sophie Bertrand a exercé dix ans comme responsable formation dans un grand groupe industriel avant de fonder son cabinet de conseil en ingénierie pedagogique. Certifiée PMP et PRINCE2, elle accompagné désormais des DRH et des responsables de développement des compétences dans le choix de leurs organismes et de leurs certifications. Sur Comparatif-Pro, elle décortique les parcours de formation, les dispositifs CPF et les certifications reconnues sur le marche, avec un souci constant de leur valeur réelle à l'embauche."
    en: "Sophie Bertrand worked for ten years as training manager in a major industrial group before founding her consulting firm specialized in instructional design. Certified PMP and PRINCE2, she now supports HR directors and skills development managers in choosing their training providers and certifications. On Comparatif-Pro, she breaks down training paths, CPF schemes and certifications recognized in the market, with constant attention to their real value in hiring."
  expertise:
