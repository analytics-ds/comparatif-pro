<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Ressources documentaires doctorat">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F2A47"/>
      <stop offset="1" stop-color="#1E4370"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Lueur d'ambiance -->
  <circle cx="950" cy="200" r="320" fill="#F59E0B" opacity="0.08"/>
  <circle cx="250" cy="650" r="260" fill="#FFFFFF" opacity="0.05"/>

  <!-- Etagere de livres (bibliotheque de recherche) -->
  <g transform="translate(120 520)">
    <rect x="0" y="0" width="620" height="160" rx="8" fill="#1F2937"/>
    <rect x="0" y="150" width="620" height="14" fill="#0B1E33"/>

    <!-- Livre 1 (bleu marine) -->
    <rect x="20" y="15" width="42" height="130" rx="3" fill="#FFFFFF" stroke="#0F2A47" stroke-width="2"/>
    <rect x="26" y="35" width="30" height="4" fill="#0F2A47"/>
    <rect x="26" y="45" width="22" height="3" fill="#0F2A47"/>

    <!-- Livre 2 (orange) -->
    <rect x="70" y="20" width="38" height="125" rx="3" fill="url(#accent)"/>
    <rect x="76" y="40" width="26" height="4" fill="#FFFFFF"/>

    <!-- Livre 3 (bleu clair) -->
    <rect x="116" y="25" width="44" height="120" rx="3" fill="#1E4370"/>
    <rect x="124" y="50" width="28" height="4" fill="#F59E0B"/>
    <rect x="124" y="60" width="20" height="3" fill="#FFFFFF" opacity="0.6"/>

    <!-- Livre 4 -->
    <rect x="168" y="10" width="40" height="135" rx="3" fill="#FFFFFF" stroke="#0F2A47" stroke-width="2"/>
    <rect x="174" y="30" width="28" height="4" fill="#F59E0B"/>

    <!-- Livre 5 (orange vif) -->
    <rect x="216" y="30" width="36" height="115" rx="3" fill="#F59E0B"/>
    <rect x="222" y="50" width="24" height="4" fill="#0F2A47"/>

    <!-- Livre 6 -->
    <rect x="260" y="18" width="44" height="127" rx="3" fill="#0F2A47"/>
    <rect x="268" y="40" width="30" height="4" fill="#F59E0B"/>
    <rect x="268" y="50" width="22" height="3" fill="#FFFFFF" opacity="0.6"/>

    <!-- Livre 7 -->
    <rect x="312" y="25" width="40" height="120" rx="3" fill="#FFFFFF" stroke="#1E4370" stroke-width="2"/>
    <rect x="318" y="45" width="28" height="4" fill="#1E4370"/>

    <!-- Livre 8 (couche en biais) -->
    <g transform="translate(360 60) rotate(-8)">
      <rect x="0" y="0" width="100" height="30" rx="3" fill="#F59E0B"/>
      <rect x="10" y="10" width="60" height="4" fill="#0F2A47"/>
      <rect x="10" y="18" width="40" height="3" fill="#0F2A47" opacity="0.6"/>
    </g>
    <!-- Pile -->
    <rect x="370" y="100" width="100" height="22" rx="3" fill="#1E4370"/>
    <rect x="378" y="108" width="40" height="4" fill="#FFFFFF"/>
    <rect x="370" y="125" width="100" height="20" rx="3" fill="#FFFFFF" stroke="#0F2A47" stroke-width="2"/>
    <rect x="378" y="132" width="50" height="4" fill="#0F2A47"/>

    <!-- Livres droits -->
    <rect x="488" y="30" width="38" height="115" rx="3" fill="#0F2A47"/>
    <rect x="494" y="50" width="26" height="4" fill="#F59E0B"/>
    <rect x="534" y="20" width="42" height="125" rx="3" fill="#F59E0B"/>
    <rect x="542" y="42" width="28" height="4" fill="#0F2A47"/>
    <rect x="584" y="15" width="30" height="130" rx="3" fill="#FFFFFF" stroke="#0F2A47" stroke-width="2"/>
    <rect x="590" y="40" width="18" height="4" fill="#0F2A47"/>
  </g>

  <!-- Carte "These / Article de recherche" au premier plan -->
  <g transform="translate(720 220)">
    <rect x="0" y="0" width="380" height="430" rx="18" fill="#FFFFFF"/>
    <rect x="0" y="0" width="380" height="80" rx="18" fill="url(#accent)"/>
    <rect x="0" y="60" width="380" height="20" fill="url(#accent)"/>
    <text x="28" y="50" font-family="DM Sans, system-ui, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Ressources Doctorat</text>

    <!-- Tag categorie -->
    <rect x="28" y="100" width="140" height="26" rx="13" fill="#EEF2F7"/>
    <text x="98" y="118" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0F2A47" text-anchor="middle">COMPARATIF</text>

    <!-- Titre carte -->
    <rect x="28" y="140" width="320" height="10" rx="3" fill="#0F2A47"/>
    <rect x="28" y="158" width="260" height="10" rx="3" fill="#0F2A47"/>
    <rect x="28" y="176" width="200" height="10" rx="3" fill="#0F2A47"/>

    <!-- Description -->
    <rect x="28" y="206" width="320" height="6" rx="3" fill="#64748B"/>
    <rect x="28" y="220" width="300" height="6" rx="3" fill="#64748B"/>
    <rect x="28" y="234" width="270" height="6" rx="3" fill="#64748B"/>

    <!-- Tableau mini -->
    <rect x="28" y="262" width="324" height="50" rx="6" fill="#F8F9FB" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="28" y1="282" x2="352" y2="282" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="110" y1="262" x2="110" y2="312" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="200" y1="262" x2="200" y2="312" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="280" y1="262" x2="280" y2="312" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="42" y="270" width="50" height="6" rx="2" fill="#0F2A47"/>
    <rect x="122" y="270" width="40" height="6" rx="2" fill="#0F2A47"/>
    <rect x="212" y="270" width="40" height="6" rx="2" fill="#0F2A47"/>
    <circle cx="150" cy="298" r="6" fill="#F59E0B"/>
    <circle cx="236" cy="298" r="6" fill="#F59E0B"/>
    <circle cx="316" cy="298" r="6" fill="#E2E8F0"/>
    <rect x="42" y="294" width="50" height="6" rx="2" fill="#64748B"/>

    <!-- Badge check -->
    <g transform="translate(28 340)">
      <circle cx="16" cy="16" r="16" fill="url(#accent)"/>
      <path d="M8 16 l6 6 l12 -12" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <rect x="44" y="10" width="180" height="6" rx="2" fill="#0F2A47"/>
      <rect x="44" y="22" width="140" height="5" rx="2" fill="#64748B"/>
    </g>
    <g transform="translate(28 380)">
      <circle cx="16" cy="16" r="16" fill="#0F2A47"/>
      <path d="M8 16 l6 6 l12 -12" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <rect x="44" y="10" width="200" height="6" rx="2" fill="#0F2A47"/>
      <rect x="44" y="22" width="120" height="5" rx="2" fill="#64748B"/>
    </g>
  </g>

  <!-- Mortar board (chapeau de graduation) -->
  <g transform="translate(140 130)">
    <polygon points="0,40 80,10 160,40 80,70" fill="#0F2A47" stroke="#F59E0B" stroke-width="3"/>
    <rect x="40" y="45" width="80" height="40" rx="4" fill="#1E4370" stroke="#F59E0B" stroke-width="2"/>
    <line x1="160" y1="40" x2="190" y2="90" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
    <circle cx="193" cy="95" r="10" fill="url(#accent)"/>
    <line x1="193" y1="95" x2="193" y2="120" stroke="#F59E0B" stroke-width="2"/>
    <line x1="193" y1="95" x2="200" y2="120" stroke="#F59E0B" stroke-width="2"/>
    <line x1="193" y1="95" x2="186" y2="120" stroke="#F59E0B" stroke-width="2"/>
  </g>

  <!-- Texte titre decoratif -->
  <text x="120" y="340" font-family="DM Sans, system-ui, sans-serif" font-size="56" font-weight="700" fill="#FFFFFF">Bases de</text>
  <text x="120" y="400" font-family="DM Sans, system-ui, sans-serif" font-size="56" font-weight="700" fill="#F59E0B">ressources</text>
  <text x="120" y="452" font-family="DM Sans, system-ui, sans-serif" font-size="36" font-weight="600" fill="#FFFFFF" opacity="0.85">pour doctorants</text>

  <!-- Badges flottants (sources) -->
  <g transform="translate(640 100)">
    <rect x="0" y="0" width="120" height="34" rx="17" fill="#FFFFFF"/>
    <text x="60" y="22" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#0F2A47" text-anchor="middle">theses.fr</text>
  </g>
  <g transform="translate(780 60)">
    <rect x="0" y="0" width="200" height="34" rx="17" fill="#F59E0B"/>
    <text x="100" y="22" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">Techniques de l'Ingénieur</text>
  </g>
  <g transform="translate(1000 120)">
    <rect x="0" y="0" width="80" height="34" rx="17" fill="#FFFFFF"/>
    <text x="40" y="22" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#0F2A47" text-anchor="middle">HAL</text>
  </g>
</svg>
