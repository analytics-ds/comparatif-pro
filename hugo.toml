baseURL = "https://comparatif-pro.com/"
title = "Comparatif-Pro"
theme = "comparatif-pro"

defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = false

enableRobotsTXT = false
enableEmoji = false
removePathAccents = true

[params]
  description = "Comparatifs independants de logiciels, equipements industriels, formations et services pour les professionnels."
  default_og_image = "/images/og-default.jpg"
  logo = "/favicon.svg"
  founding_year = "2026"
  expertise = ["Comparatif B2B", "Logiciels professionnels", "Equipements industriels", "Formations techniques"]

[taxonomies]
  category = "categories"
  tag = "tags"

[languages]
  [languages.fr]
    languageCode = "fr-FR"
    languageName = "Francais"
    weight = 1
    contentDir = "content"
    title = "Comparatif-Pro"
    [languages.fr.params]
      description = "Comparatifs independants de logiciels, equipements industriels, formations et services pour les professionnels."

  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    weight = 2
    contentDir = "content/en"
    title = "Comparatif-Pro"
    [languages.en.params]
      description = "Independent comparisons of software, industrial equipment, training and services for professionals."

# Menu FR (categories uniquement, pas d'Accueil ni de Blog dans le header)
[[languages.fr.menus.main]]
  name = "Aménagement de bureaux"
  url = "/categories/amenagement-de-bureaux/"
  weight = 2
[[languages.fr.menus.main]]
  name = "Équipements industriels"
  url = "/categories/equipements-industriels/"
  weight = 3
[[languages.fr.menus.main]]
  name = "Logiciels professionnels"
  url = "/categories/logiciels-professionnels/"
  weight = 4
[[languages.fr.menus.main]]
  name = "Formations et certifications"
  url = "/categories/formations-et-certifications/"
  weight = 5
[[languages.fr.menus.main]]
  name = "Outillage et matériel"
  url = "/categories/outillage-et-materiel/"
  weight = 6
[[languages.fr.menus.main]]
  name = "Services aux entreprises"
  url = "/categories/services-aux-entreprises/"
  weight = 7

# Menu EN (categories only, no Home or Blog in header)
[[languages.en.menus.main]]
  name = "Office furnishing"
  url = "/en/categories/office-furnishing/"
  weight = 2
[[languages.en.menus.main]]
  name = "Industrial equipment"
  url = "/en/categories/industrial-equipment/"
  weight = 3
[[languages.en.menus.main]]
  name = "Professional software"
  url = "/en/categories/professional-software/"
  weight = 4
[[languages.en.menus.main]]
  name = "Training & certifications"
  url = "/en/categories/training-certifications/"
  weight = 5
[[languages.en.menus.main]]
  name = "Tools & equipment"
  url = "/en/categories/tools-equipment/"
  weight = 6
[[languages.en.menus.main]]
  name = "Business services"
  url = "/en/categories/business-services/"
  weight = 7

[related]
  includeNewer = true
  threshold = 80
  toLower = true
  [[related.indices]]
    name = "categories"
    weight = 100
  [[related.indices]]
    name = "tags"
    weight = 80
  [[related.indices]]
    name = "date"
    weight = 10

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
    ordered = true
  [markup.goldmark.renderer]
    unsafe = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

# Desactiver la minification XML pour avoir un sitemap lisible
[minify]
  disableXML = true

