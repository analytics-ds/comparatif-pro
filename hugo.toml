baseURL = "https://analytics-ds.github.io/comparatif-pro/"
title = "Comparatif-Pro"
theme = "comparatif-pro"

languageCode = "fr-FR"
defaultContentLanguage = "fr"

enableRobotsTXT = true
enableEmoji = false

[params]
  description = "Comparatifs independants de logiciels, equipements industriels, formations et services pour les professionnels."
  default_og_image = "/images/og-default.jpg"
  logo = "/favicon.svg"
  founding_year = "2026"
  expertise = ["Comparatif B2B", "Logiciels professionnels", "Equipements industriels", "Formations techniques"]

[taxonomies]
  category = "categories"
  tag = "tags"

# Menu FR
[[menus.main]]
  name = "Accueil"
  url = "/"
  weight = 1
[[menus.main]]
  name = "Amenagement de bureaux"
  url = "/categories/amenagement-de-bureaux/"
  weight = 2
[[menus.main]]
  name = "Equipements industriels"
  url = "/categories/equipements-industriels/"
  weight = 3
[[menus.main]]
  name = "Logiciels professionnels"
  url = "/categories/logiciels-professionnels/"
  weight = 4
[[menus.main]]
  name = "Formations et certifications"
  url = "/categories/formations-et-certifications/"
  weight = 5
[[menus.main]]
  name = "Outillage et materiel"
  url = "/categories/outillage-et-materiel/"
  weight = 6
[[menus.main]]
  name = "Services aux entreprises"
  url = "/categories/services-aux-entreprises/"
  weight = 7
[[menus.main]]
  name = "Le Blog"
  url = "/blog/"
  weight = 99

[related]
  includeNewer = true
  threshold = 80
  toLower = true
  [[related.indices]]
    name = "categories"
    weight = 100
  [[related.indices]]
    name = "tags"
    weight = 80
  [[related.indices]]
    name = "date"
    weight = 10

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = true
  [markup.goldmark.renderer]
    unsafe = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
